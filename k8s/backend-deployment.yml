apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-chat-app
          image: sangitamaldode/chatapp-backend:v1
          ports:
            - containerPort: 5001
          env:
            - name: MONGODB_URI
              value: "mongodb://root:root@mongodb:27017/chatApp?authSource=admin"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: jwt
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "development"